<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width">
    </head>
    <body style="margin:0;padding:20px;background:#f4f4f4;font-family:Arial,sans-serif;">
        <table role="presentation" width="100%" style="max-width:600px;margin:auto;">
        <!-- Header -->
            <tr>
                <td style="padding:40px 30px;background:#fff;border-radius:10px 10px 0 0;">
                    <img src="http://localhost:8000/static/video_app/images/Logo.svg"   alt="Videoflix" style="max-width:150px;">
                    <h1 style="color:#333;margin:20px 0;font-size:28px;">Welcome to Videoflix!</h1>
                </td>
            </tr>
        <!-- Content -->
            <tr>
                <td style="padding:30px;background:#fff;">
                    <p style="font-size:16px;line-height:1.6;color:#555;">
                        Hi👋,<br>
                        Click below to reset your password:
                    </p>
                <!-- Button -->
                    <table role="presentation" style="margin:30px 0;">
                        <tr>
                            <td style="background:#007bff;border-radius:6px;">
                                <a href="{{ reset_password_link }}"
                                   style="display:inline-block;padding:15px 30px;color:#fff;text-decoration:none;font-weight:bold;font-size:16px;">
                                    Reset Password
                                </a>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        <!-- Footer -->
            <tr>
                <td style="padding:30px;background:#f8f9fa;border-radius:0 0 10px 10px;text-align:center;">
                    <p>&copy; 2026 Videoflix. All rights reserved.</p>
                </td>
            </tr>
        </table>
    </body>
</html>
